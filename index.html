/* =========================

}

/* =========================
PITY
========================= */

}

.pityLabel{

}

.pityBar{

rgba(
255,
255,

border-radius:999px;

}

.pityFill{

height:100%;

width:0%;

background:

linear-gradient(
90deg,
#22c55e,
#3b82f6
);

transition:
0.3s;

}

/* =========================
BUTTON
========================= */

.btn{

border:none;

padding:10px 14px;

border-radius:12px;

cursor:pointer;

font-weight:bold;

background:
#2563eb;

color:white;

}

.btn:hover{

opacity:0.9;

}

/* =========================
CENTER
========================= */

.centerPanel{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:20px;

padding:20px;

position:relative;

}

/* =========================
PACK
========================= */

.packImage{

width:320px;

max-width:90%;

cursor:pointer;

transition:0.3s;

}

.packImage:hover{

transform:scale(1.05);

}

.openBtn{

font-size:20px;

padding:14px 26px;

}

/* =========================
REWARD
========================= */

.rewardCard{

display:none;

flex-direction:column;

align-items:center;

gap:12px;

}

.rewardCard img{

width:260px;

border-radius:18px;

}

/* =========================
RIGHT
========================= */

.rightPanel{

display:flex;

flex-direction:column;

overflow:hidden;

}

/* =========================
ACCORDION
========================= */

.accordionItem{

border-bottom:

1px solid rgba(
255,
255,
255,
0.08
);

}

.accordionHeader{

padding:15px;

cursor:pointer;

font-weight:bold;

background:

rgba(
255,
255,
255,
0.05
);

}

.accordionBody{

display:none;

height:400px;

overflow-y:auto;

padding:12px;

}

.accordionItem.active
.accordionBody{

display:block;

}

/* =========================
CARD ITEM
========================= */

.cardItem{

padding:12px;

margin-bottom:10px;

border-radius:12px;

background:

rgba(
255,
255,
255,
0.06
);

cursor:pointer;

}

.marketCard{

border:

1px solid gold;

}

/* =========================
MODAL
========================= */

.modal{

display:none;

position:fixed;

inset:0;

background:

rgba(
0,
0,
0,
0.85
);

align-items:center;

justify-content:center;

z-index:999;

}

.modalContent{

background:
#111827;

padding:20px;

border-radius:18px;

max-width:90%;

max-height:90%;

overflow:auto;

}

.modalContent img{

max-width:100%;

}

/* =========================
NOTIFICATION DOT
========================= */

.redDot{

width:12px;
height:12px;

border-radius:50%;

background:red;

display:none;

}

/* =========================
TABLET
========================= */

@media
(max-width:1200px){

.main{

grid-template-columns:
1fr;

overflow-y:auto;

}

.leftPanel,
.centerPanel,
.rightPanel{

min-height:500px;

}

body{

overflow:auto;

}

}

/* =========================
MOBILE
========================= */

@media
(max-width:700px){

.header{

font-size:20px;

}

.packImage{

width:220px;

}

.openBtn{

font-size:16px;

}

}

<script type="module">

/* =========================
FIREBASE IMPORT
========================= */

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
addDoc,
deleteDoc,
collection,
query,
where,
orderBy,
limit,
getDocs,
serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
FIREBASE CONFIG
THAY BẰNG CONFIG CỦA BẠN
========================= */

const firebaseConfig={

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_PROJECT.firebaseapp.com",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_PROJECT.appspot.com",

messagingSenderId:"123456",

appId:"YOUR_APP_ID"

};

const app=
initializeApp(
firebaseConfig
);

const db=
getFirestore(
app
);

/* =========================
COLLECTIONS
========================= */

const USERS=
"users";

const OPEN_LOGS=
"openLogs";

const NOTIFICATIONS=
"notifications";

const MARKET_TRADES=
"marketTrades";

const TRANSFER_LOGS=
"transferLogs";

const TRANSFERS=
"transfers";

/* =========================
VERSION
========================= */

const VERSION=
"FC Premium V4 Fixed";

/* =========================
ADMIN PASSWORD
========================= */

const ADMIN_PASSWORD=
"nhatisreal";

/* =========================
APP STATE
========================= */

const APP={

version:VERSION,

admin:false,

opening:false,

rewardClaimed:false,

currentReward:null,

deviceId:null,

user:null

};

/* =========================
DEVICE ID
========================= */

function getDeviceId(){

let id=

localStorage.getItem(
"fc_device_id"
);

if(!id){

id=

"FC_"+

Date.now()+

"_"+

Math.random()
.toString(36)
.substring(2,8);

localStorage.setItem(
"fc_device_id",
id
);

}

return id;

}

APP.deviceId=
getDeviceId();

/* =========================
DEFAULT USER
========================= */

function createDefaultUser(){

return{

deviceId:
APP.deviceId,

username:
"Người Chơi",

opensLeft:
10,

normalPity:
0,

buPity:
0,

inventory:{},

marketInventory:{},

createdAt:
Date.now()

};

}

/* =========================
LOAD USER
========================= */

async function loadUser(){

const ref=

doc(
db,
USERS,
APP.deviceId
);

const snap=
await getDoc(
ref
);

if(
snap.exists()
){

APP.user=
snap.data();

}
else{

APP.user=
createDefaultUser();

await setDoc(
ref,
APP.user
);

}

}

/* =========================
SAVE USER
========================= */

async function saveUser(){

await setDoc(

doc(
db,
USERS,
APP.deviceId
),

APP.user,

{
merge:true
}

);

}

/* =========================
RENDER PLAYER
========================= */

function renderPlayer(){

document
.getElementById(
"playerName"
)
.innerText=

APP.user.username;

document
.getElementById(
"openCount"
)
.innerText=

APP.user.opensLeft||0;

/* pity10 */

const pity10=

Math.min(

100,

(
(APP.user.normalPity||0)
/
10
)
*100

);

document
.getElementById(
"pity10Bar"
)
.style.width=

pity10+"%";

/* pity30 */

const pity30=

Math.min(

100,

(
(APP.user.buPity||0)
/
30
)
*100

);

document
.getElementById(
"pity30Bar"
)
.style.width=

pity30+"%";

}

/* =========================
ĐỔI TÊN
========================= */

document
.getElementById(
"changeNameBtn"
)
.onclick=
async()=>{

const name=

prompt(
"Tên mới"
);

if(!name)
return;

APP.user.username=
name.trim();

await saveUser();

renderPlayer();

};

/* =========================
ADMIN LOGIN
========================= */

document
.getElementById(
"adminBtn"
)
.onclick=
()=>{

const pass=
prompt(
"Mật khẩu Admin"
);

if(
pass!==ADMIN_PASSWORD
){

alert(
"Sai mật khẩu"
);

return;

}

APP.admin=true;

alert(
"Admin Mode"
);

};

/* =========================
ACCORDION
========================= */

function setupAccordion(){

const items=

document.querySelectorAll(
".accordionItem"
);

items.forEach(item=>{

const header=

item.querySelector(
".accordionHeader"
);

header.onclick=
()=>{

items.forEach(i=>{

if(i!==item){

i.classList.remove(
"active"
);

}

});

item.classList.toggle(
"active"
);

};

});

}

/* =========================
PREVIEW MODAL
========================= */

const previewModal=

document.getElementById(
"previewModal"
);

const previewImage=

document.getElementById(
"previewImage"
);

window.showPreview=
function(src){

previewImage.src=
src;

previewModal.style.display=
"flex";

};

previewModal.onclick=
()=>{

previewModal.style.display=
"none";

};

/* =========================
NOTIFICATION
========================= */

async function addNotification(

title,
message

){

await addDoc(

collection(
db,
NOTIFICATIONS
),

{

deviceId:
APP.deviceId,

title,

message,

createdAt:
serverTimestamp()

}

);

}

/* =========================
OPEN LOG
========================= */

async function addOpenLog(

card

){

await addDoc(

collection(
db,
OPEN_LOGS
),

{

deviceId:
APP.deviceId,

card,

createdAt:
serverTimestamp()

}

);

}

/* =========================
MARKET LOG
========================= */

async function addMarketLog(

text

){

await addDoc(

collection(
db,
MARKET_TRADES
),

{

deviceId:
APP.deviceId,

text,

createdAt:
serverTimestamp()

}

);

}

/* =========================
TRANSFER LOG
========================= */

async function addTransferLog(

text

){

await addDoc(

collection(
db,
TRANSFER_LOGS
),

{

deviceId:
APP.deviceId,

text,

createdAt:
serverTimestamp()

}

);

}

/* =========================
BOOT
========================= */

await loadUser();

renderPlayer();

setupAccordion();

console.log(
"FC Premium V4 Fixed Ready"
);
  /* =========================
CARD DATA
========================= */

const CARD_DATA={

BOLON:{
image:"cards/bolon.png",
video:"videos/bolon.mp4",
weight:40
},

HUY:{
image:"cards/huy.png",
video:"videos/huy.mp4",
weight:30
},

BONHO:{
image:"cards/bonho.png",
video:"videos/bonho.mp4",
weight:18
},

BU:{
image:"cards/bu.png",
video:"videos/bu.mp4",
weight:8
},

GAO:{
image:"cards/gao.png",
video:"videos/gao.mp4",
weight:3
},

PHI:{
image:"cards/phi.png",
video:"videos/phi.mp4",
weight:0.8
},

TIN:{
image:"cards/tin.png",
video:"videos/tin.mp4",
weight:0.2
}

};

const NORMAL_CARDS=[

"BOLON",
"HUY",
"BONHO",
"BU",
"GAO",
"PHI",
"TIN"

];

const BU_PLUS=[

"BU",
"GAO",
"PHI",
"TIN"

];

/* =========================
PACK UI
========================= */

const openPackBtn=
document.getElementById(
"openPackBtn"
);

const rewardCard=
document.getElementById(
"rewardCard"
);

const rewardImage=
document.getElementById(
"rewardImage"
);

const rewardName=
document.getElementById(
"rewardName"
);

const claimBtn=
document.getElementById(
"claimBtn"
);

/* =========================
ANTI SPAM
========================= */

let packLocked=false;

/* =========================
ROLL NORMAL
========================= */

function rollCard(){

const total=

NORMAL_CARDS.reduce(

(sum,name)=>

sum+
CARD_DATA[name].weight,

0

);

let random=
Math.random()*total;

for(
const card
of NORMAL_CARDS
){

random-=

CARD_DATA[
card
].weight;

if(
random<=0
){

return card;

}

}

return "BOLON";

}

/* =========================
ROLL BU+
========================= */

function rollBUPlus(){

const pool=[

"BU",
"GAO",
"PHI",
"TIN"

];

return pool[
Math.floor(
Math.random()*pool.length
)
];

}

/* =========================
VIDEO POPUP
========================= */

function playRewardVideo(card){

const old=
document.getElementById(
"rewardVideoModal"
);

if(old)
old.remove();

const modal=
document.createElement(
"div"
);

modal.id=
"rewardVideoModal";

modal.className=
"modal";

modal.style.display=
"flex";

modal.innerHTML=`

<div class="modalContent">

<video

autoplay

controls

style="
max-width:700px;
width:100%;
border-radius:15px;
">

<source

src="${
CARD_DATA[
card
].video
}"

type="video/mp4">

</video>

</div>

`;

document.body.appendChild(
modal
);

setTimeout(()=>{

modal.onclick=
()=>modal.remove();

},500);

}

/* =========================
OPEN PACK
========================= */

async function openPack(){

if(packLocked)
return;

if(APP.opening)
return;

if(
(APP.user.opensLeft||0)<=0
){

alert(
"Hết lượt mở"
);

return;

}

APP.opening=true;
packLocked=true;

try{

APP.user.opensLeft--;

APP.user.normalPity++;

APP.user.buPity++;

let reward;

/* =========================
PITY 30
========================= */

if(
(APP.user.buPity||0)>=30
){

reward=
rollBUPlus();

APP.user.buPity=0;

}
else{

reward=
rollCard();

if(
BU_PLUS.includes(
reward
)
){

APP.user.buPity=0;

}

}

/* =========================
SHOW REWARD
========================= */

APP.currentReward=
reward;

APP.rewardClaimed=false;

rewardImage.src=

CARD_DATA[
reward
].image;

rewardName.innerText=
reward;

rewardCard.style.display=
"flex";

playRewardVideo(
reward
);

await saveUser();

renderPlayer();

}
catch(err){

console.error(
err
);

alert(
"Lỗi mở pack"
);

}
finally{

APP.opening=false;

setTimeout(()=>{

packLocked=false;

},1500);

}

}

/* =========================
CLAIM REWARD
========================= */

async function claimReward(){

if(
APP.rewardClaimed
)
return;

if(
!APP.currentReward
)
return;

APP.rewardClaimed=true;

const card=
APP.currentReward;

if(
!APP.user.inventory[
card
]
){

APP.user.inventory[
card
]=0;

}

APP.user.inventory[
card
]++;

await addOpenLog(
card
);

await addNotification(

"Nhận Thẻ",

card

);

await saveUser();

rewardCard.style.display=
"none";

APP.currentReward=null;

await refreshUI();

}

/* =========================
BUTTONS
========================= */

openPackBtn.onclick=
openPack;

claimBtn.onclick=
claimReward;

/* =========================
REFRESH UI
========================= */

async function refreshUI(){

renderPlayer();

}

/* =========================
DEBUG
========================= */

console.log(
"Pack Engine Loaded"
);
  /* =========================
MARKET CARDS
========================= */

const MARKET_CARDS=[

"BOLON_MARKET",
"HUY_MARKET",
"BONHO_MARKET",
"BU_MARKET",
"GAO_MARKET",
"PHI_MARKET",
"TIN_MARKET"

];

/* =========================
GET BASE CARD
========================= */

function getBaseCard(card){

return card
.replace("_MARKET","");

}

/* =========================
CREATE CARD HTML
========================= */

function createCardHTML(

name,
count,
market=false

){

if(count<=0)
return "";

const base=
getBaseCard(
name
);

const image=

CARD_DATA[
base
]?.image ||

"cards/default.png";

return `

<div
class="cardItem
${market ? "marketCard" : ""}"

onclick="
showPreview(
'${image}'
)
">

<b>

${name}

</b>

<br>

Số lượng:
${count}

</div>

`;

}

/* =========================
RENDER INVENTORY
========================= */

function renderInventory(){

let html="";

/* NORMAL */

html+=`

<h3>

⚽ THẺ THƯỜNG

</h3>

`;

NORMAL_CARDS.forEach(card=>{

html+=createCardHTML(

card,

APP.user.inventory[
card
]||0,

false

);

});

/* MARKET */

html+=`

<hr
style="
margin:12px 0;
opacity:.3;
">

<h3>

🏪 THẺ MARKET

</h3>

`;

MARKET_CARDS.forEach(card=>{

html+=createCardHTML(

card,

APP.user.marketInventory[
card
]||0,

true

);

});

document
.getElementById(
"inventoryList"
)
.innerHTML=
html;

}

/* =========================
LOAD NOTIFICATIONS
========================= */

async function renderNotifications(){

const q=

query(

collection(
db,
NOTIFICATIONS
),

where(
"deviceId",
"==",
APP.deviceId
),

orderBy(
"createdAt",
"desc"
),

limit(50)

);

const snap=
await getDocs(q);

let html="";

let count=0;

snap.forEach(docSnap=>{

const data=
docSnap.data();

count++;

html+=`

<div class="cardItem">

<b>

${data.title||""}

</b>

<br>

${data.message||""}

</div>

`;

});

if(
html===""
){

html=
"Không có thông báo";

}

document
.getElementById(
"notificationList"
)
.innerHTML=
html;

/* RED DOT */

document
.getElementById(
"notifDot"
)
.style.display=

count>0
?
"inline-block"
:
"none";

}

/* =========================
OPEN HISTORY
========================= */

async function renderOpenLogs(){

const q=

query(

collection(

/* =========================

========================= */

window.acceptTransfer=
async function(id){

const ref=
doc(
db,
TRANSFERS,
id
);

const snap=
await getDoc(
ref
);

if(
!snap.exists()
)
return;

const data=
snap.data();

if(
data.status!=="pending"
)
return;

APP.user.inventory[
data.card
]=

(APP.user.inventory[
data.card
]||0)

+

data.amount;

await saveUser();

await updateDoc(

ref,

{
status:
"accepted"
}

);

await addTransferLog(

"Nhận "+

data.card+

" x"+

data.amount

);

await addNotification(

"Nhận thẻ",

data.card

);

await refreshUI();

};

/* =========================
REJECT
========================= */

window.rejectTransfer=
async function(id){

const ref=
doc(
db,
TRANSFERS,
id
);

const snap=
await getDoc(
ref
);

if(
!snap.exists()
)
return;

const data=
snap.data();

/* hoàn trả */

const users=

await getDocs(
collection(
db,
USERS
)
);

for(
const userDoc
of users.docs
){

const u=
userDoc.data();

if(
u.username===
data.from
){

u.inventory[
data.card
]=

(u.inventory[
data.card
]||0)

+

data.amount;

await updateDoc(

doc(
db,
USERS,
userDoc.id
),

{
inventory:
u.inventory
}

);

break;

}

}

await updateDoc(

ref,

{
status:
"rejected"
}

);

await refreshUI();

};

/* =========================
ADD MARKET CARD
========================= */

function addMarketCard(card){

if(
!APP.user.marketInventory[
card
]
){

APP.user.marketInventory[
card
]=0;

}

APP.user.marketInventory[
card
]++;

}

/* =========================
REMOVE CARD
ƯU TIÊN MARKET
========================= */

function removeCardPriority(card){

const marketCard=
card+"_MARKET";

if(

APP.user.marketInventory[
marketCard
] > 0

){

APP.user.marketInventory[
marketCard
]--;

return true;

}

if(

APP.user.inventory[
card
] > 0

){

APP.user.inventory[
card
]--;

return true;

}

return false;

}

/* =========================
CRAFT
========================= */

window.craftMarketCard=
async function(card){

const recipe=
MARKET_RECIPES[
card
];

if(!recipe)
return;

/* BOLON MARKET */

if(
card==="BOLON_MARKET"
){

const anyCard=

NORMAL_CARDS.find(c=>
(APP.user.inventory[c]||0)>0
);

if(!anyCard){

alert(
"Thiếu nguyên liệu"
);

return;

}

APP.user.inventory[
anyCard
]--;

addMarketCard(card);

}

/* HUY MARKET */

else if(
card==="HUY_MARKET"
){

const anyCard=

NORMAL_CARDS.find(c=>
(APP.user.inventory[c]||0)>0
);

if(!anyCard){

alert(
"Thiếu nguyên liệu"
);

return;

}

APP.user.inventory[
anyCard
]--;

addMarketCard(card);

}

/* CÁC THẺ KHÁC */

else{

for(
const need
of recipe.need
){

const ok=
removeCardPriority(
need
);

if(!ok){

alert(
"Thiếu "+need
);

return;

}

}

addMarketCard(
card
);

}

await addMarketLog(

"Đổi "+card

);

await addNotification(

"Market",

card

);

await saveUser();

await refreshUI();

};

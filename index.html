<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FC Premium V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:
radial-gradient(circle at top,#1c5fa8 0%,#0c2338 40%,#04080d 100%);
color:white;
min-height:100vh;
}

.header{
text-align:center;
padding:20px;
font-size:36px;
font-weight:bold;
text-shadow:0 0 15px gold;
}

.layout{
display:grid;
grid-template-columns:280px 1fr 320px;
gap:20px;
padding:20px;
}

.panel{
background:rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.12);
}

.center{
text-align:center;
}

.pack{
width:280px;
height:380px;
margin:auto;
border-radius:24px;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
font-weight:bold;

background:
linear-gradient(
135deg,
#123b67,
#08131f
);

box-shadow:0 0 30px gold;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.inventoryItem,
.historyItem,
.notifyItem{
background:rgba(255,255,255,.05);
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.history{
max-height:250px;
overflow-y:auto;
}

.overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
z-index:9999;

justify-content:center;
align-items:center;
flex-direction:column;
}

.overlay video{
max-width:90vw;
max-height:80vh;
border-radius:16px;
}

.cardResult img{
width:260px;
max-width:80vw;
border-radius:18px;
box-shadow:0 0 30px gold;
}

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

.pack{
width:220px;
height:300px;
font-size:24px;
}

button{
width:100%;
margin-bottom:10px;
}

}

</style>
</head>

<body>

<div class="header">
⚽ FC PREMIUM V2 ⚽
</div>

<div class="layout">

<div class="panel">

<h2>Người chơi</h2>

<div id="usernameBox">
Đang tải...
</div>

<br>

<button id="changeNameBtn">
Đổi tên
</button>

<br>

<div id="opensBox">
Lượt mở: ?
</div>

<br>

<button id="adminBtn">
Admin
</button>

<hr style="margin:15px 0">

<h3>Tỉ lệ</h3>

<ul>
<li>BOLON - 28%</li>
<li>HUY - 28%</li>
<li>BONHO - 20%</li>
<li>BU - 10%</li>
<li>GAO - 6%</li>
<li>PHI - 4%</li>
<li>TIN - 4%</li>
</ul>

<div id="adminPanel" style="display:none;margin-top:20px;">
</div>

</div>

<div class="center">

<div class="pack">
MYSTERY PACK
</div>

<br>

<button id="openBtn">
MỞ TÚI
</button>

</div>

<div class="panel">

<h2>Kho thẻ</h2>

<div id="inventory">
Đang tải...
</div>

<hr style="margin:15px 0">

<h2>Thông báo</h2>

<div id="notifications">
Chưa có thông báo
</div>

<hr style="margin:15px 0">

<h2>Lịch sử</h2>

<div id="history" class="history">
</div>

</div>

</div>

<div id="overlay" class="overlay">

<div id="videoHolder"></div>

<div id="cardHolder"></div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
collection,
getDocs,
addDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyC7zCqjOfpyj3bR37xHj4CA5XIxyc_x_Yk",

authDomain:"fc-mystery-pack.firebaseapp.com",

projectId:"fc-mystery-pack",

storageBucket:"fc-mystery-pack.firebasestorage.app",

messagingSenderId:"64482739800",

appId:"1:64482739800:web:f2fc37048fa577f19cec2d"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const ADMIN_PASSWORD =
"nhatisreal";

let isAdmin = false;

let username = "";

let deviceId = "";

let opensLeft = 0;

const cards = [

{
name:"BOLON",
chance:28,
image:"cards/bolon.png"
},

{
name:"HUY",
chance:28,
image:"cards/huy.png"
},

{
name:"BONHO",
chance:20,
image:"cards/bonho.png"
},

{
name:"BU",
chance:10,
image:"cards/bu.png"
},

{
name:"GAO",
chance:6,
image:"cards/gao.png"
},

{
name:"PHI",
chance:4,
image:"cards/phi.png"
},

{
name:"TIN",
chance:4,
image:"cards/tin.png"
}

];

const videoMap = {

BOLON:"videos/bolon.mp4",
HUY:"videos/huy.mp4",
BONHO:"videos/bonho.mp4",
BU:"videos/bu.mp4",
GAO:"videos/gao.mp4",
PHI:"videos/phi.mp4",
TIN:"videos/tin.mp4"

};

async function initUser(){

deviceId =
localStorage.getItem(
"deviceId"
);

if(!deviceId){

deviceId =
crypto.randomUUID();

localStorage.setItem(
"deviceId",
deviceId
);

}

username =
localStorage.getItem("username");

while(
!username ||
username.trim() === "" ||
username === "Người chơi"
){

username =
prompt("Nhập tên người chơi:");

if(username === null){
continue;
}

username =
username.trim();

if(username.length < 3){
username = "";
}

}

localStorage.setItem(
"username",
username
);

const userRef =
doc(
db,
"users",
deviceId
);

const userSnap =
await getDoc(
userRef
);

if(!userSnap.exists()){

await setDoc(
userRef,
{

username:username,

opensLeft:1,

inventory:{
BOLON:0,
HUY:0,
BONHO:0,
BU:0,
GAO:0,
PHI:0,
TIN:0
},

history:[]

}
);

opensLeft = 1;

}else{

const data =
userSnap.data();

opensLeft =
data.opensLeft || 0;

}

document.getElementById(
"usernameBox"
).innerText =
"Tên: " + username;

updateOpenText();

}

function updateOpenText(){

document.getElementById(
"opensBox"
).innerText =
"Lượt mở: " +
opensLeft;

}

function randomCard(){

let total = 0;

for(const card of cards){

total += card.chance;

}

let rand =
Math.random() * total;

let current = 0;

for(const card of cards){

current += card.chance;

if(rand <= current){

return card;

}

}

return cards[0];

}
async function renderInventory(){

const userRef =
doc(db,"users",deviceId);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()) return;

const data =
userSnap.data();

const inv =
data.inventory;

let html = "";

for(const card of cards){

html += `
<div class="inventoryItem">

<div>

<b>${card.name}</b>

<br>

Sở hữu:
${inv[card.name] || 0}


</div>

<button onclick="sendCardPrompt('${card.name}')">
GỬI
</button>

</div>
`;

}

document.getElementById(
"inventory"
).innerHTML = html;

}

async function renderHistory(){

const userRef =
doc(db,"users",deviceId);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()) return;

const data =
userSnap.data();

let html = "";

for(const item of data.history){

html += `
<div class="historyItem">

${item.time}

<br>

🎴 ${item.card}

</div>
`;

}

document.getElementById(
"history"
).innerHTML = html;

}

async function addCard(cardName){

const userRef =
doc(db,"users",deviceId);

const userSnap =
await getDoc(userRef);

const data =
userSnap.data();

data.inventory[cardName]++;

data.history.unshift({

card:cardName,

time:new Date()
.toLocaleString()

});

if(
data.history.length > 50
){
data.history.pop();
}

await updateDoc(
userRef,
{
inventory:data.inventory,
history:data.history
}
);

await renderInventory();

await renderHistory();

}

window.openPack =
async function(){

if(
!isAdmin &&
opensLeft <= 0
){

alert(
"Bạn đã hết lượt mở!"
);

return;

}

const reward =
randomCard();

if(!isAdmin){

opensLeft--;

updateOpenText();

await updateDoc(
doc(db,"users",deviceId),
{
opensLeft:opensLeft
}
);

}

const overlay =
document.getElementById(
"overlay"
);

overlay.style.display =
"flex";

document.getElementById(
"cardHolder"
).innerHTML = "";

document.getElementById(
"videoHolder"
).innerHTML =

`
<video
id="packVideo"
autoplay>

<source
src="${videoMap[reward.name]}"
type="video/mp4">

</video>
`;

const video =
document.getElementById(
"packVideo"
);

video.onended =
function(){

document.getElementById(
"videoHolder"
).innerHTML = "";

document.getElementById(
"cardHolder"
).innerHTML =

`
<div class="cardResult">

<img
src="${reward.image}"
alt="${reward.name}">

<br><br>

<h2>${reward.name}</h2>

<br>

<button
onclick="closeReward('${reward.name}')">

NHẬN THẺ

</button>

</div>
`;

};

};

window.closeReward =
async function(cardName){

await addCard(cardName);

document.getElementById(
"overlay"
).style.display =
"none";

};
window.sendCardPrompt =
async function(cardName){

const receiver =
prompt("Tên người nhận:");

if(!receiver) return;

const amount =
parseInt(
prompt("Số lượng:")
);

if(
isNaN(amount) ||
amount <= 0
){
return;
}

const userRef =
doc(db,"users",deviceId);

const userSnap =
await getDoc(userRef);

const user =
userSnap.data();

if(
(user.inventory[cardName] || 0)
< amount
){

alert("Không đủ thẻ");

return;

}

await addDoc(
collection(db,"transfers"),
{

from:username,

fromId:deviceId,

to:receiver,

card:cardName,

amount:amount,

status:"pending",

time:new Date()
.toLocaleString()

});

alert(
"Đã gửi yêu cầu"
);

};

async function loadNotifications(){

const snap =
await getDocs(
collection(db,"transfers")
);

let html = "";

snap.forEach(docSnap=>{

const data =
docSnap.data();

if(
data.to === username &&
data.status === "pending"
){

html += `
<div class="notifyItem">

<b>${data.from}</b>

<br>

${data.card}
x${data.amount}

<br><br>

<button
onclick="acceptTransfer('${docSnap.id}')">

NHẬN

</button>

<button
onclick="rejectTransfer('${docSnap.id}')">

TỪ CHỐI

</button>

</div>
`;

}

});

if(html===""){

html =
"Chưa có thông báo";

}

document.getElementById(
"notifications"
).innerHTML =
html;

}

window.acceptTransfer =
async function(id){

const transferRef =
doc(db,"transfers",id);

const transferSnap =
await getDoc(
transferRef
);

if(!transferSnap.exists())
return;

const transfer =
transferSnap.data();

const senderRef =
doc(
db,
"users",
transfer.fromId
);

const senderSnap =
await getDoc(senderRef);

const sender =
senderSnap.data();

if(
(sender.inventory[
transfer.card
] || 0)
<
transfer.amount
){

alert(
"Người gửi không đủ thẻ"
);

return;

}

sender.inventory[
transfer.card
] -= transfer.amount;

await updateDoc(
senderRef,
{
inventory:
sender.inventory
}
);

const myRef =
doc(
db,
"users",
deviceId
);

const mySnap =
await getDoc(myRef);

const me =
mySnap.data();

me.inventory[
transfer.card
] += transfer.amount;

await updateDoc(
myRef,
{
inventory:
me.inventory
}
);

await deleteDoc(
transferRef
);

await renderInventory();

await loadNotifications();

alert(
"Đã nhận thẻ"
);

};

window.rejectTransfer =
async function(id){

await deleteDoc(
doc(
db,
"transfers",
id
)
);

await loadNotifications();

};

window.adminLogin =
async function(){

const pass =
prompt(
"Mật khẩu Admin:"
);

if(
pass !==
ADMIN_PASSWORD
){

alert(
"Sai mật khẩu"
);

return;

}

isAdmin = true;

document.getElementById(
"adminPanel"
).style.display =
"block";

await loadAdminPanel();

};

async function loadAdminPanel(){

if(!isAdmin) return;

const snap =
await getDocs(
collection(db,"users")
);

let html =
"<h3>Quản trị</h3>";

snap.forEach(userDoc=>{

const data =
userDoc.data();

html += `

<div class="historyItem">

<b>
${data.username}
</b>

<br>

Lượt:
${data.opensLeft || 0}

<br><br>

<button
onclick="giveOpen('${userDoc.id}',1)">
+1
</button>

<button
onclick="giveOpen('${userDoc.id}',5)">
+5
</button>

<button
onclick="giveOpen('${userDoc.id}',10)">
+10
</button>

</div>

`;

});

document.getElementById(
"adminPanel"
).innerHTML =
html;

}

window.giveOpen =
async function(
userId,
amount
){

const userRef =
doc(
db,
"users",
userId
);

const snap =
await getDoc(
userRef
);

const data =
snap.data();

await updateDoc(
userRef,
{
opensLeft:
(data.opensLeft || 0)
+
amount
}
);

await loadAdminPanel();

alert(
"Đã cộng "
+
amount
+
" lượt"
);

};

document
.getElementById(
"openBtn"
)
.addEventListener(
"click",
openPack
);

document
.getElementById(
"adminBtn"
)
.addEventListener(
"click",
adminLogin
);


document
.getElementById("changeNameBtn")
.addEventListener("click", async ()=>{

let newName =
prompt("Tên mới:");

if(!newName) return;

newName =
newName.trim();

if(newName.length < 3){
return;
}

username = newName;

localStorage.setItem(
"username",
username
);

await updateDoc(
doc(db,"users",deviceId),
{
username:username
}
);

document.getElementById(
"usernameBox"
).innerText =
"Tên: " + username;

});


await initUser();

await renderInventory();

await renderHistory();

await loadNotifications();
</script>

</body>
</html>

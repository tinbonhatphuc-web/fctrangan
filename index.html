function buildPool(){

const pool=[];

cards.forEach(
card=>{

for(
let i=0;
i<card.chance;
i++
){

pool.push({

name:
card.name,

market:false

});

}

for(
let i=0;
i<card.marketChance;
i++
){

pool.push({

name:
card.name,

market:true

});

}

});

return pool;

}

function randomCard(){

const pool=
buildPool();

return pool[
Math.floor(
Math.random()
*
pool.length
)
];

}

async function addCard(
reward
){

const userRef=
doc(
db,
"users",
deviceId
);

const snap=
await getDoc(
userRef
);

const data=
snap.data();

if(
reward.market
){

data.marketInventory[
reward.name
]++;

if(
!data.marketHistory
){

data.marketHistory=
[];

}

data.marketHistory.unshift({

card:
reward.name+
" 🔒",

time:
new Date()
.toLocaleString()

});

if(
data.marketHistory.length
>100
){

data.marketHistory.pop();

}

}else{

data.inventory[
reward.name
]++;

}

data.history.unshift({

card:
reward.name+

(
reward.market
?
" 🔒"
:
""
),

time:
new Date()
.toLocaleString()

});

if(
data.history.length
>100
){

data.history.pop();

}

await updateDoc(
userRef,
{

inventory:
data.inventory,

marketInventory:
data.marketInventory,

history:
data.history,

marketHistory:
data.marketHistory

}
);

}

window.sendCardPrompt=
async function(
cardName
){

const receiver=
prompt(
"Tên người nhận:"
);

if(!receiver)
return;

const amount=
parseInt(
prompt(
"Số lượng:"
)
);

if(
isNaN(amount)
||
amount<=0
){

return;

}

const userRef=
doc(
db,
"users",
deviceId
);

const userSnap=
await getDoc(
userRef
);

const user=
userSnap.data();

if(
(user.inventory[cardName]||0)
< amount
){
alert("Không đủ thẻ");
return;
}

user.inventory[
cardName
]-=amount;

await updateDoc(
userRef,
{
inventory:
user.inventory
}
);

await addDoc(
collection(
db,
"transfers"
),
{

from:
username,

fromId:
deviceId,

to:
receiver,

card:
cardName,

amount,

status:
"pending",

time:
new Date()
.toLocaleString()

}
);

alert(
"Đã gửi yêu cầu"
);

};

window.randomRecall=
async function(
userId
){

const userRef=
doc(
db,
"users",
userId
);

const snap=
await getDoc(
userRef
);

const data=
snap.data();

if(!data.history){
data.history=[];
}

const pool=[];

Object.entries(
data.inventory
)
.forEach(
([card,count])=>{

for(
let i=0;
i<count;
i++
){

pool.push(
card
);

}

});

if(
pool.length===0
){

alert(
"Không có thẻ để thu hồi"
);

return;

}

const target=

pool[
Math.floor(
Math.random()
*
pool.length
)
];

data.inventory[
target
]--;

data.history.unshift({

card:
"❌ Thu hồi "+target,

time:
new Date()
.toLocaleString()

});

await updateDoc(
userRef,
{

inventory:
data.inventory,

history:
data.history

}
);

alert(
"Đã thu hồi "+target
);

};

function buildPool(){

const pool=[];

cards.forEach(
card=>{

for(
let i=0;
i<card.chance;
i++
){

pool.push({

name:
card.name,

market:false

});

}

for(
let i=0;
i<card.marketChance;
i++
){

pool.push({

name:
card.name,

market:true

});

}

});

return pool;

}

function randomCard(){

const pool=
buildPool();

return pool[
Math.floor(
Math.random()
*
pool.length
)
];

}

async function addCard(
reward
){

const userRef=
doc(
db,
"users",
deviceId
);

const snap=
await getDoc(
userRef
);

const data=
snap.data();

if(
reward.market
){

data.marketInventory[
reward.name
]++;

if(
!data.marketHistory
){

data.marketHistory=
[];

}

data.marketHistory.unshift({

card:
reward.name+
" 🔒",

time:
new Date()
.toLocaleString()

});

if(
data.marketHistory.length
>100
){

data.marketHistory.pop();

}

}else{

data.inventory[
reward.name
]++;

}

data.history.unshift({

card:
reward.name+

(
reward.market
?
" 🔒"
:
""
),

time:
new Date()
.toLocaleString()

});

if(
data.history.length
>100
){

data.history.pop();

}

await updateDoc(
userRef,
{

inventory:
data.inventory,

marketInventory:
data.marketInventory,

history:
data.history,

marketHistory:
data.marketHistory

}
);

}

document.getElementById("overlay").style.display = "none";

await renderInventory();
await renderMarketInventory();
await renderCollection();
await renderHistory();

};

window.acceptTransfer=
async function(
id
){

const transferRef=
doc(
db,
"transfers",
id
);

const transferSnap=
await getDoc(
transferRef
);

if(
!transferSnap.exists()
)
return;

const transfer=
transferSnap.data();

const senderRef=
doc(
db,
"users",
transfer.fromId
);

const senderSnap=
await getDoc(
senderRef
);
if(
!senderSnap.exists()
){
alert(
"Người gửi không tồn tại"
);
return;
}

const sender=
senderSnap.data();

if(

(
sender.inventory[
transfer.card
]||0

)

<
transfer.amount

){

alert(
"Người gửi không đủ thẻ"
);

return;

}

sender.inventory[
transfer.card
] -= transfer.amount;

await updateDoc(
senderRef,
{
inventory:
sender.inventory
}
);

const myRef=
doc(
db,
"users",
deviceId
);

const mySnap=
await getDoc(
myRef
);

const me=
mySnap.data();

me.inventory[
transfer.card
]+=transfer.amount;

await updateDoc(
myRef,
{
inventory:
me.inventory
}
);

await deleteDoc(
transferRef
);

await renderInventory();

await loadNotifications();

alert(
"Đã nhận thẻ"
);

};

window.randomRecall=
async function(
userId
){

const userRef=
doc(
db,
"users",
userId
);

const snap=
await getDoc(
userRef
);

const data=
snap.data();

if(!data.history){
data.history=[];
}

const pool=[];

Object.entries(
data.inventory
)
.forEach(
([card,count])=>{

for(
let i=0;
i<count;
i++
){

pool.push(
card
);

}

});

if(
pool.length===0
){

alert(
"Không có thẻ để thu hồi"
);

return;

}

const target=

pool[
Math.floor(
Math.random()
*
pool.length
)
];

data.inventory[
target
]--;

data.history.unshift({

card:
"❌ Thu hồi "+target,

time:
new Date()
.toLocaleString()

});

await updateDoc(
userRef,
{

inventory:
data.inventory,

history:
data.history

}
);

alert(
"Đã thu hồi "+target
);

};

function chooseCard(cardsOwned, inv){

    return new Promise(resolve=>{

        const modal =
        document.getElementById("selectCardModal");

        const list =
        document.getElementById("selectCardList");

        list.innerHTML="";

        cardsOwned.forEach(card=>{

            const btn =
            document.createElement("button");

            btn.className =
            "selectCardBtn";
btn.innerHTML = `
<div style="
display:flex;
align-items:center;
gap:10px;
">
    <img
    src="cards/${card.toLowerCase()}.png"
    style="
    width:50px;
    height:auto;
    border-radius:8px;
    ">

    <div style="text-align:left;">
        <b>${card}</b><br>
        Sở hữu: x${inv[card]}
    </div>
</div>
`;

            btn.onclick = ()=>{

                modal.style.display="none";

                resolve(card);

            };

            list.appendChild(btn);

        });

        modal.style.display="flex";

    });

}

window.exchangeCard =
async function(resultCard){

const userRef =
doc(db,"users",deviceId);

const snap =
await getDoc(userRef);

const data =
snap.data();

const inv =
data.inventory;

function take(card){

if((inv[card] || 0) <= 0)
return false;

inv[card]--;
return true;

}

switch(resultCard){

case "BOLON":
case "HUY":

const ownedCards =
Object.keys(inv)
.filter(card => inv[card] > 0);

if(ownedCards.length === 0){
    alert("Bạn không có thẻ nào");
    return;
}

let selectedCard =
await chooseCard(ownedCards, inv);

selectedCard =
selectedCard.toUpperCase();

if(
!inv[selectedCard] ||
inv[selectedCard] <= 0
){
    alert("Bạn không sở hữu thẻ này");
    return;
}

inv[selectedCard]--;

break;

case "BONHO":

if(
!take("BOLON") &&
!take("HUY")
){
alert(
"Cần BOLON hoặc HUY"
);
return;
}

break;

case "BU":

if(
!take("BONHO")
){
alert(
"Cần BONHO"
);
return;
}

if(
!take("BOLON") &&
!take("HUY")
){
inv["BONHO"]++;
alert(
"Cần BOLON hoặc HUY"
);
return;
}

break;

case "GAO":

if(
!take("BU")
){
alert("Cần BU");
return;
}

if(
!take("BONHO")
){
inv["BU"]++;
alert("Cần BONHO");
return;
}

if(
!take("BOLON") &&
!take("HUY")
){
inv["BU"]++;
inv["BONHO"]++;
alert("Cần BOLON hoặc HUY");
return;
}

break;

case "PHI":
case "TIN":
case "TAN":

if(!take("GAO")){
alert("Cần GAO");
return;
}

if(!take("BU")){
inv["GAO"]++;
alert("Cần BU");
return;
}

if(!take("BONHO")){
inv["GAO"]++;
inv["BU"]++;
alert("Cần BONHO");
return;
}

if(
!take("BOLON") &&
!take("HUY")
){
inv["GAO"]++;
inv["BU"]++;
inv["BONHO"]++;
alert(
"Cần BOLON hoặc HUY"
);
return;
}

break;

default:
return;

}

if(!data.marketInventory){
    data.marketInventory = {};
}

if(!data.marketInventory[resultCard]){
    data.marketInventory[resultCard] = 0;
}

data.marketInventory[resultCard]++;

if(!data.marketHistory)
data.marketHistory=[];

data.marketHistory.unshift({
card: resultCard + " 🔒",
time: new Date().toLocaleString()
});

await updateDoc(
userRef,
{
inventory:data.inventory,
marketInventory:data.marketInventory,
marketHistory:data.marketHistory

);

await renderInventory();
await renderMarketInventory();
await renderCollection();
await renderHistory();

alert(
"Đổi thành công " +
resultCard +
" 🔒"
);

};

);

</script>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Túi Mù FC Premium</title>
<style>
body{font-family:Arial,sans-serif;background:#081420;color:#fff;margin:0}
.header{text-align:center;font-size:36px;padding:20px;font-weight:bold}
#playerInfo{text-align:center;font-size:20px;margin-bottom:10px}
.layout{display:grid;grid-template-columns:260px 1fr 280px;gap:20px;padding:20px}
.panel{background:#14263a;padding:15px;border-radius:15px}
.center{text-align:center}
.pack{width:280px;height:380px;margin:auto;border-radius:20px;background:#1d3d5e;display:flex;align-items:center;justify-content:center;font-size:30px}
button{padding:12px 20px;border:none;border-radius:10px;cursor:pointer}
.history{max-height:300px;overflow:auto}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);justify-content:center;align-items:center;flex-direction:column}
.card{font-size:40px;padding:40px;background:gold;color:black;border-radius:15px;margin:20px}
</style>
</head>
<body>

<div class="header">⚽ TÚI MÙ FC PREMIUM ⚽</div>
<div id="playerInfo"></div>

<div class="layout">
<div class="panel">
<h3>Tỉ lệ</h3>
<ul>
<li>BOLON 30%</li>
<li>HUY 30%</li>
<li>BONHO 20%</li>
<li>BU 10%</li>
<li>PHI 5%</li>
<li>TIN 5%</li>
</ul>
<button onclick="adminLogin()">Admin</button>
<button onclick="addOpenPrompt()">+ Lượt</button>
</div>

<div class="center">
<div class="pack">MYSTERY PACK</div><br>
<button onclick="openPack()">MỞ TÚI</button>
</div>

<div class="panel">
<h3>Lịch sử</h3>
<div id="history" class="history"></div>
</div>
</div>

<div id="overlay" class="overlay">
<div id="reward"></div>
<button onclick="closeReward()">Đóng</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"YOUR_API_KEY",
 authDomain:"YOUR_PROJECT.firebaseapp.com",
 projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD="nhatisreal";

let isAdmin=false;
let username="";
let deviceId="";
let opensLeft=0;

const cards=[
{name:"BOLON",chance:30},
{name:"HUY",chance:30},
{name:"BONHO",chance:20},
{name:"BU",chance:10},
{name:"PHI",chance:5},
{name:"TIN",chance:5}
];

async function initUser(){
deviceId=localStorage.getItem("deviceId");
if(!deviceId){
 deviceId=crypto.randomUUID();
 localStorage.setItem("deviceId",deviceId);
}

username=localStorage.getItem("username");
if(!username){
 username=prompt("Nhập tên:");
 localStorage.setItem("username",username);
}

const today=new Date().toDateString();

const ref=doc(db,"users",deviceId);
const snap=await getDoc(ref);

if(!snap.exists()){
 await setDoc(ref,{
   username,
   opensLeft:1,
   lastReset:today,
   history:[]
 });
 opensLeft=1;
}else{
 const data=snap.data();

 if(data.lastReset!==today){
   opensLeft=1;
   await updateDoc(ref,{
      opensLeft:1,
      lastReset:today
   });
 }else{
   opensLeft=data.opensLeft||0;
 }
}

updatePlayerInfo();
}

function updatePlayerInfo(){
document.getElementById("playerInfo").innerHTML =
`${username} | Lượt mở: ${opensLeft}`;
}

window.adminLogin=function(){
const p=prompt("Mật khẩu Admin");
if(p===ADMIN_PASSWORD){
 isAdmin=true;
 alert("Đăng nhập thành công");
}
}

window.addOpenPrompt=async function(){
if(!isAdmin){
 alert("Cần quyền admin");
 return;
}
const amount=parseInt(prompt("Cộng bao nhiêu lượt?"),10);
if(!amount) return;

opensLeft+=amount;

await updateDoc(doc(db,"users",deviceId),{
 opensLeft
});

updatePlayerInfo();
}

function canOpen(){
if(isAdmin) return true;
return opensLeft>0;
}

function randomCard(){
let total=cards.reduce((a,b)=>a+b.chance,0);
let r=Math.random()*total;
let cur=0;
for(const c of cards){
 cur+=c.chance;
 if(r<=cur) return c;
}
}

function renderHistory(){
let h=JSON.parse(localStorage.getItem("history")||"[]");
document.getElementById("history").innerHTML=h.join("<br>");
}

function addHistory(name){
let h=JSON.parse(localStorage.getItem("history")||"[]");
h.unshift(new Date().toLocaleString()+" - "+name);
h=h.slice(0,20);
localStorage.setItem("history",JSON.stringify(h));
renderHistory();
}

window.openPack=async function(){
if(!canOpen()){
 alert("Hết lượt mở!");
 return;
}

const reward=randomCard();

if(!isAdmin){
 opensLeft--;
 await updateDoc(doc(db,"users",deviceId),{opensLeft});
 updatePlayerInfo();
}

document.getElementById("overlay").style.display="flex";
document.getElementById("reward").innerHTML=
`<div class="card">${reward.name}</div>`;

addHistory(reward.name);
}

window.closeReward=function(){
document.getElementById("overlay").style.display="none";
}

renderHistory();
initUser();
</script>

</body>
</html>
